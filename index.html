function getTrack(date, isCampSeason) {
  const dow = date.getDay(); // 0=Sun, 2=Tue, 4=Thu, 6=Sat
  const isPoolDay = [2, 4, 6].includes(dow);
  if (isPoolDay) return isCampSeason ? TRACK_B_CAMP : TRACK_B_PRECAMP;
  return isCampSeason ? TRACK_A_CAMP : TRACK_A_PRECAMP;
}

function trackLabel(date) {
  const dow = date.getDay();
  const isPoolDay = [2, 4, 6].includes(dow);
  return isPoolDay ? "Track B — Pool Day (5am)" : "Track A — Standard Day (1pm training)";
}

function isFastingDay(date) {
  return date.getDay() === 5; // Friday
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function todayPhase() {
  const d = new Date();
  if (d < new Date("2026-06-01")) return "pre";
  if (d < new Date("2026-07-01")) return "phase1";
  if (d < new Date("2026-08-01")) return "phase2";
  return "phase3";
}

function todayWeekIdx() {
  const d = new Date();
  const phaseStarts = {
    pre:    new Date("2026-05-18"),  // Programme started Monday May 18
    phase1: new Date("2026-06-01"),
    phase2: new Date("2026-07-01"),
    phase3: new Date("2026-08-01"),
  };
  const phase = todayPhase();
  const start = phaseStarts[phase];
  const msPerWeek = 7 * 24 * 60 * 60 * 1000;
  const weekNum = Math.floor((d - start) / msPerWeek);
  const maxWeeks = { pre: 2, phase1: 4, phase2: 4, phase3: 4 };
  return Math.max(0, Math.min(weekNum, maxWeeks[phase] - 1));
}

function todayDayName() {
  return DAYS[((new Date().getDay() + 6) % 7)];
}

function getUpcomingMoons(n = 3) {
  const today = new Date();
  return MOONS_2026.filter(m => new Date(m.date) >= today).slice(0, n);
}

function formatMoonDate(ds) {
  return new Date(ds).toLocaleDateString("en-GB", { day:"numeric", month:"short" });
}

const EXERCISE_TYPES = [
  { key:"swim",     label:"Swim" },
  { key:"apnea",    label:"Apnea / UW" },
  { key:"strength", label:"Strength" },
  { key:"cardio",   label:"Cardio" },
  { key:"breath",   label:"Breathwork" },
  { key:"other",    label:"Other" },
];

function emptySet() {
  return { id: Date.now() + Math.random(), pulseBefore:"", pulseAfter:"", difficulty:"", notes:"" };
}

function emptyExercise(name="", type="swim") {
  return { id: Date.now() + Math.random(), name, type, sets:[emptySet()], detail:"" };
}

function WorkoutEditor({ dk, sessionLabel, sessionType, existingTasks, workoutData, onSave, onClose, tc, T }) {
  const [sessionNotes, setSessionNotes] = useState(workoutData?.sessionNotes || "");
  const [exercises, setExercises] = useState(() => {
    if (workoutData?.exercises?.length > 0) return workoutData.exercises;
    return existingTasks.map(t => emptyExercise(t, guessType(sessionType)));
  });
  const [customName, setCustomName] = useState("");

  function guessType(st) {
    if (["pool","pool-apnea","pool-deep"].includes(st)) return "swim";
    if (["dry"].includes(st)) return "apnea";
    if (["cardio","hiit"].includes(st)) return "cardio";
    if (["strength","apnea-strength"].includes(st)) return "strength";
    return "other";
  }

  function updateEx(id, field, val) {
    setExercises(prev => prev.map(e => e.id===id ? {...e,[field]:val} : e));
  }

  function updateSet(exId, setId, field, val) {
    setExercises(prev => prev.map(e => e.id!==exId ? e : {
      ...e, sets: e.sets.map(s => s.id!==setId ? s : {...s,[field]:val})
    }));
  }

  function addSet(exId) {
    setExercises(prev => prev.map(e => e.id!==exId ? e : {
      ...e, sets: [...e.sets, emptySet()]
    }));
  }

  function removeSet(exId, setId) {
    setExercises(prev => prev.map(e => e.id!==exId ? e : {
      ...e, sets: e.sets.filter(s => s.id!==setId)
    }));
  }

  function addExercise() {
    if (!customName) return;
    setExercises(prev => [...prev, emptyExercise(customName, guessType(sessionType))]);
    setCustomName("");
  }

  function removeExercise(id) {
    setExercises(prev => prev.filter(e => e.id!==id));
  }

  function handleSave() {
    onSave(dk, { sessionNotes, exercises });
    onClose();
  }

  const iS = { background:T.input, border:`1px solid ${T.inputBorder}`, borderRadius:4,
    padding:"5px 8px", color:T.text, fontSize:12, fontFamily:"inherit", boxSizing:"border-box" };
  const smS = { ...iS, width:64, textAlign:"center" };

  return (
    <div style={{ background:T.card, border:`1px solid ${tc}55`, borderRadius:9, padding:14, marginTop:10 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
        <div>
          <span style={{ fontSize:13, color:tc }}>{sessionLabel}</span>
          <span style={{ fontSize:11, color:T.textMid, marginLeft:8 }}>session log</span>
        </div>
        <button onClick={onClose} style={{ background:"none", border:"none", color:T.textFaint, cursor:"pointer", fontSize:16 }}>✕</button>
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:12 }}>
        {exercises.map((ex) => (
          <div key={ex.id} style={{ background:T.cardAlt, border:`1px solid ${T.border}`, borderRadius:8, overflow:"hidden" }}>
            {/* Exercise header */}
            <div style={{ background:tc+"22", borderBottom:`1px solid ${T.border}`, padding:"8px 12px", display:"flex", gap:8, alignItems:"center" }}>
              <input value={ex.name} onChange={e=>updateEx(ex.id,"name",e.target.value)}
                placeholder="Exercise / drill name"
                style={{ ...iS, flex:1, background:"transparent", border:"none", fontWeight:600, fontSize:13, color:T.text, padding:"2px 0" }} />
              <select value={ex.type} onChange={e=>updateEx(ex.id,"type",e.target.value)}
                style={{ ...iS, fontSize:11, padding:"3px 6px" }}>
                {EXERCISE_TYPES.map(t => <option key={t.key} value={t.key}>{t.label}</option>)}
              </select>
              <input value={ex.detail||""} onChange={e=>updateEx(ex.id,"detail",e.target.value)}
                placeholder="e.g. 25m u/w, PT: 1:00-1:30"
                style={{ ...iS, width:160, fontSize:11 }} />
              <button onClick={()=>removeExercise(ex.id)} style={{ background:"none", border:"none", color:T.textFaint, cursor:"pointer", fontSize:13 }}>✕</button>
            </div>

            {/* Set rows — David Lee table format */}
            <div style={{ padding:"8px 12px" }}>
              <div style={{ display:"grid", gridTemplateColumns:"28px 1fr 72px 72px 72px 28px", gap:5, marginBottom:5, alignItems:"center" }}>
                <div style={{ fontSize:9, color:T.textFaint, textAlign:"center" }}>#</div>
                <div style={{ fontSize:9, color:T.textFaint, textTransform:"uppercase", letterSpacing:"0.08em" }}>Notes / details</div>
                <div style={{ fontSize:9, color:T.textFaint, textAlign:"center", lineHeight:1.2 }}>Pulse<br/>Before</div>
                <div style={{ fontSize:9, color:T.textFaint, textAlign:"center", lineHeight:1.2 }}>Pulse<br/>After</div>
                <div style={{ fontSize:9, color:T.textFaint, textAlign:"center", lineHeight:1.2 }}>Diff<br/>1–10</div>

                  <div style={{ fontSize:11, color:T.textMid, textAlign:"center" }}>{sIdx+1}</div>

                    placeholder="how it felt..."
                    style={{ ...iS, width:"100%" }} />
                  <input value={s.pulseBefore} onChange={e=>updateSet(ex.id,s.id,"pulseBefore",e.target.value)}
                    placeholder="X"
                    style={{ ...smS }} />
                  <input value={s.pulseAfter} onChange={e=>updateSet(ex.id,s.id,"pulseAfter",e.target.value)}
                    placeholder="—"
                    style={{ ...smS }} />
                  <input value={s.difficulty} onChange={e=>updateSet(ex.id,s.id,"difficulty",e.target.value)}
                    placeholder="—"
                    style={{ ...smS }} />
                  <button onClick={()=>removeSet(ex.id,s.id)} disabled={ex.sets.length===1}
                    style={{ background:"none", border:"none", color:ex.sets.length===1?T.textVeryDim:T.textFaint,
                      cursor:ex.sets.length===1?"default":"pointer", fontSize:12 }}>✕</button>
                </div>
              ))}

              <button onClick={()=>addSet(ex.id)} style={{
                marginTop:4, padding:"3px 12px", background:"transparent",
                border:`1px dashed ${tc}55`, borderRadius:4, color:tc+"cc", cursor:"pointer",
                fontSize:11, fontFamily:"inherit",
              }}>+ set / interval</button>
            </div>
          </div>
        ))}
      </div>

      <div style={{ display:"flex", gap:8, marginBottom:12, alignItems:"center" }}>
        <input value={customName} onChange={e=>setCustomName(e.target.value)}
          onKeyDown={e => e.key==="Enter" && addExercise()}
          placeholder="Add exercise or drill..."
          style={{ ...iS, flex:1 }} />
        <button onClick={addExercise} style={{ padding:"5px 14px", background:tc+"22",
          border:`1px solid ${tc}55`, borderRadius:5, color:tc, cursor:"pointer",
          fontSize:12, fontFamily:"inherit" }}>+ Add</button>
      </div>

      <div style={{ marginBottom:14 }}>
        <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.1em", color:T.textMid, marginBottom:4 }}>Session notes</div>
        <textarea value={sessionNotes} onChange={e=>setSessionNotes(e.target.value)}
          placeholder="Overall how it went, what to adjust, how you felt..."
          style={{ ...iS, width:"100%", minHeight:55, resize:"vertical" }} />
      </div>

      <div style={{ display:"flex", gap:8 }}>
        <button onClick={handleSave} style={{ padding:"7px 20px", background:tc, border:"none",
          borderRadius:5, color:"#fff", cursor:"pointer", fontSize:12, fontFamily:"inherit", fontWeight:600 }}>Save session</button>
        <button onClick={onClose} style={{ padding:"7px 14px", background:"transparent",
          border:`1px solid ${T.border}`, borderRadius:5, color:T.textMid, cursor:"pointer",
          fontSize:12, fontFamily:"inherit" }}>Cancel</button>
      </div>
    </div>
  );
}


// ─── CYCLE & MOON COMPONENT ──────────────────────────────────────────────────
const FLOW_LEVELS = [
  { key:"spotting", label:"Spotting", color:"#c47ca033", dot:"·" },
  { key:"light",    label:"Light",    color:"#c47ca066", dot:"○" },
  { key:"medium",   label:"Medium",   color:"#c47ca0aa", dot:"●" },
  { key:"heavy",    label:"Heavy",    color:"#c47ca0",   dot:"◉" },
];

const ENERGY_OPTS = ["⚡ High","🔆 Good","😐 Okay","🌫 Low","🪫 Depleted"];
const MOOD_OPTS   = ["🌸 Bright","😊 Content","😶 Neutral","😔 Low","😤 Irritable","😢 Emotional","🌀 Anxious","🔥 Passionate"];
const BODY_OPTS   = ["💪 Strong","🧘 Grounded","🌊 Fluid","😴 Tired","🤕 Cramps","🫁 Bloated","🌡 Tender","✨ Clear"];

function getDaysInMonth(year, month) {
  return new Date(year, month + 1, 0).getDate();
}

function CycleAndMoon({ cyclePhase, cycleDay, updateCycle, bleedDays, toggleBleedDay,
  feelingsLog, saveFeeling, cycleStartDate, setCycleStartDate, upcomingMoons, cp, ac, T, CYCLE_PHASES }) {
  T = T || makeTheme(true);
  CYCLE_PHASES = CYCLE_PHASES || makeCyclePhases(T);

  const [tab, setTab] = useState("track");
  const [calMonth, setCalMonth] = useState(() => { const d = new Date(); return { y: d.getFullYear(), m: d.getMonth() }; });
  const [selectedDate, setSelectedDate] = useState(() => new Date().toISOString().slice(0,10));
  const [feelingDraft, setFeelingDraft] = useState({ energy:"", mood:[], body:[], notes:"", phase: cyclePhase });
  const [showFeelingForm, setShowFeelingForm] = useState(false);

  const daysInMonth = getDaysInMonth(calMonth.y, calMonth.m);
  const firstDay = new Date(calMonth.y, calMonth.m, 1).getDay(); // 0=Sun
  const calOffset = (firstDay + 6) % 7; // Mon-start offset
  const todayStr = new Date().toISOString().slice(0,10);

  function dateStr(day) {
    return `${calMonth.y}-${String(calMonth.m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
  }

  function loadFeelingForDate(date) {
    const existing = feelingsLog[date];
    setFeelingDraft(existing ? { ...existing } : { energy:"", mood:[], body:[], notes:"", phase: cyclePhase });
    setShowFeelingForm(true);
  }

  function toggleArr(arr, val) {
    return arr.includes(val) ? arr.filter(x=>x!==val) : [...arr, val];
  }

  const bleedCount = Object.keys(bleedDays).length;
  const feelCount = Object.keys(feelingsLog).length;

  // Recent feelings sorted
  const recentFeelings = Object.entries(feelingsLog)
    .sort((a,b) => b[0].localeCompare(a[0]))
    .slice(0, 10);

  return (
    <div>
      {/* Sub-tabs */}
      <div style={{ display:"flex", gap:0, borderBottom:`1px solid ${T.border}`, marginBottom:18 }}>
        {[["track","Cycle Tracker"],["phase","Phase Guide"],["moon","Moon Calendar"]].map(([v,l]) => (
          <button key={v} onClick={() => setTab(v)} style={{
            padding:"6px 14px", background:"none", border:"none",
            borderBottom: tab===v ? `2px solid ${cp.color}` : "2px solid transparent",
            color: tab===v ? cp.color : "#444", cursor:"pointer", fontSize:12,
            fontFamily:"inherit", marginBottom:-1,
          }}>{l}</button>
        ))}
      </div>

      {/* ── TRACKER TAB ── */}
      {tab === "track" && (
        <div>
          {/* Phase + day editor */}
          <div style={{ background:cp.bg, border:`1px solid ${cp.color}33`, borderRadius:9, padding:14, marginBottom:16 }}>
            <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.12em", color:cp.color, marginBottom:10 }}>Current Phase</div>
            <div style={{ display:"flex", gap:7, flexWrap:"wrap", marginBottom:12 }}>
              {Object.entries(CYCLE_PHASES).map(([k,v]) => (
                <button key={k} onClick={() => updateCycle(k, k===cyclePhase ? cycleDay : 1)} style={{
                  padding:"5px 12px", borderRadius:14, border:`1px solid ${cyclePhase===k ? v.color : T.inputBorder}`,
                  background: cyclePhase===k ? v.color+"22" : "transparent",
                  color: cyclePhase===k ? v.color : "#445", cursor:"pointer", fontSize:12, fontFamily:"inherit",
                }}>{v.label}</button>
              ))}
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <span style={{ fontSize:11, color:T.textMid, minWidth:28 }}>Day</span>
              <input type="range" min={1} max={35} value={cycleDay}
                onChange={e => updateCycle(cyclePhase, Number(e.target.value))}
                style={{ flex:1, accentColor:cp.color }} />
              <span style={{ fontSize:16, color:cp.color, fontVariantNumeric:"tabular-nums", minWidth:28, textAlign:"right" }}>{cycleDay}</span>
            </div>
            <div style={{ display:"flex", gap:12, marginTop:12, alignItems:"center" }}>
              <div style={{ flex:1 }}>
                <label style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.1em", color:T.textMid, display:"block", marginBottom:3 }}>Cycle start date</label>
                <input type="date" value={cycleStartDate} onChange={e => setCycleStartDate(e.target.value)}
                  style={{ background:T.input, border:`1px solid ${T.inputBorder}`, borderRadius:5, padding:"5px 9px", color:T.text, fontSize:12, fontFamily:"inherit" }} />
              </div>
              <div style={{ fontSize:11, color:T.textMid, fontStyle:"italic" }}>{cp.theme}</div>
            </div>
          </div>

          {/* Calendar */}
          <div style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:9, padding:14, marginBottom:16 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <button onClick={() => setCalMonth(p => { const d = new Date(p.y, p.m-1); return {y:d.getFullYear(),m:d.getMonth()}; })}
                style={{ background:"none", border:`1px solid ${T.inputBorder}`, borderRadius:5, padding:"3px 9px", color:T.textMid, cursor:"pointer", fontFamily:"inherit" }}>←</button>
              <span style={{ fontSize:13, color:T.text }}>
                {new Date(calMonth.y, calMonth.m).toLocaleDateString("en-GB",{month:"long",year:"numeric"})}
              </span>
              <button onClick={() => setCalMonth(p => { const d = new Date(p.y, p.m+1); return {y:d.getFullYear(),m:d.getMonth()}; })}
                style={{ background:"none", border:`1px solid ${T.inputBorder}`, borderRadius:5, padding:"3px 9px", color:T.textMid, cursor:"pointer", fontFamily:"inherit" }}>→</button>
            </div>

            {/* Day headers */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3, marginBottom:4 }}>
              {["M","T","W","T","F","S","S"].map((d,i) => (
                <div key={i} style={{ textAlign:"center", fontSize:10, color:T.textFaint, padding:"2px 0" }}>{d}</div>
              ))}
            </div>

            {/* Day grid */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3 }}>
              {Array.from({length: calOffset}).map((_,i) => <div key={`e${i}`} />)}
              {Array.from({length: daysInMonth}).map((_,i) => {
                const day = i+1;
                const ds = dateStr(day);
                const flow = bleedDays[ds];
                const hasFeeling = !!feelingsLog[ds];
                const isToday = ds === todayStr;
                const isSelected = ds === selectedDate;
                const flowColor = flow ? FLOW_LEVELS.find(f=>f.key===flow)?.color : null;
                return (
                  <div key={day} onClick={() => setSelectedDate(ds)}
                    style={{
                      borderRadius:6, padding:"5px 2px", textAlign:"center", cursor:"pointer", position:"relative",
                      background: isSelected ? cp.color+"33" : flow ? flowColor+"22" : "transparent",
                      border: isToday ? `1px solid ${cp.color}88` : isSelected ? `1px solid ${cp.color}66` : `1px solid #1a1d24`,
                      minHeight:38,
                    }}>
                    <div style={{ fontSize:12, color: isToday ? cp.color : T.textSub, fontWeight: isToday?"600":"normal" }}>{day}</div>
                    <div style={{ fontSize:14, lineHeight:1 }}>
                      {flow ? <span style={{ color: FLOW_LEVELS.find(f=>f.key===flow)?.color }}>
                        {FLOW_LEVELS.find(f=>f.key===flow)?.dot}
                      </span> : hasFeeling ? <span style={{ fontSize:8, color:"#5bb8a0" }}>●</span> : null}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Flow legend */}
            <div style={{ display:"flex", gap:12, marginTop:10, flexWrap:"wrap" }}>
              {FLOW_LEVELS.map(f => (
                <div key={f.key} style={{ display:"flex", alignItems:"center", gap:5 }}>
                  <span style={{ fontSize:14, color:f.color }}>{f.dot}</span>
                  <span style={{ fontSize:10, color:T.textMid }}>{f.label}</span>
                </div>
              ))}
              <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                <span style={{ fontSize:8, color:"#5bb8a0" }}>●</span>
                <span style={{ fontSize:10, color:T.textMid }}>Feeling logged</span>
              </div>
            </div>
          </div>

          {/* Selected day panel */}
          <div style={{ background:T.card, border:`1px solid ${cp.color}33`, borderRadius:9, padding:14, marginBottom:16 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <span style={{ fontSize:13, color:cp.color }}>{new Date(selectedDate+"T12:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}</span>
              {selectedDate <= todayStr && <button onClick={() => loadFeelingForDate(selectedDate)}
                style={{ padding:"4px 12px", background:cp.color+"22", border:`1px solid ${cp.color}44`, borderRadius:5, color:cp.color, cursor:"pointer", fontSize:11, fontFamily:"inherit" }}>
                {feelingsLog[selectedDate] ? "Edit feelings" : "+ Log feelings"}
              </button>}
            </div>

            {/* Flow selector for selected date */}
            <div style={{ marginBottom:12 }}>
              <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.1em", color:T.textMid, marginBottom:8 }}>Bleed / Flow</div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                {FLOW_LEVELS.map(f => {
                  const active = bleedDays[selectedDate] === f.key;
                  return (
                    <button key={f.key} onClick={() => toggleBleedDay(selectedDate, f.key)}
                      style={{ padding:"5px 14px", borderRadius:14, border:`1px solid ${active ? f.color : T.inputBorder}`,
                        background: active ? f.color+"22" : "transparent",
                        color: active ? f.color : "#555", cursor:"pointer", fontSize:12, fontFamily:"inherit",
                        display:"flex", alignItems:"center", gap:6 }}>
                      <span>{f.dot}</span> {f.label}
                    </button>
                  );
                })}
                {bleedDays[selectedDate] && (
                  <button onClick={() => toggleBleedDay(selectedDate, bleedDays[selectedDate])}
                    style={{ padding:"5px 12px", borderRadius:14, border:`1px solid ${T.inputBorder}`, background:"transparent", color:T.textFaint, cursor:"pointer", fontSize:11, fontFamily:"inherit" }}>
                    Clear
                  </button>
                )}
              </div>
            </div>

            {/* Existing feeling summary */}
            {feelingsLog[selectedDate] && !showFeelingForm && (
              <div style={{ background:cp.bg, borderRadius:7, padding:"10px 12px" }}>
                <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.1em", color:cp.color+"88", marginBottom:8 }}>How I felt</div>
                {feelingsLog[selectedDate].energy && <div style={{ fontSize:12, color:T.textSub, marginBottom:4 }}>Energy: {feelingsLog[selectedDate].energy}</div>}
                {feelingsLog[selectedDate].mood?.length > 0 && <div style={{ fontSize:12, color:T.textSub, marginBottom:4 }}>Mood: {feelingsLog[selectedDate].mood.join("  ")}</div>}
                {feelingsLog[selectedDate].body?.length > 0 && <div style={{ fontSize:12, color:T.textSub, marginBottom:4 }}>Body: {feelingsLog[selectedDate].body.join("  ")}</div>}
                {feelingsLog[selectedDate].notes && <div style={{ fontSize:12, color:T.textMid, fontStyle:"italic", marginTop:6 }}>{feelingsLog[selectedDate].notes}</div>}
              </div>
            )}

            {/* Feeling form */}
            {showFeelingForm && (
              <div style={{ background:cp.bg, borderRadius:8, padding:12 }}>
                <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.1em", color:cp.color, marginBottom:12 }}>Log how you feel</div>

                <div style={{ marginBottom:10 }}>
                  <div style={{ fontSize:10, color:T.textMid, marginBottom:6 }}>Energy</div>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                    {ENERGY_OPTS.map(o => (
                      <button key={o} onClick={() => setFeelingDraft(p=>({...p, energy: p.energy===o?"":o}))}
                        style={{ padding:"4px 10px", borderRadius:12, border:`1px solid ${feelingDraft.energy===o ? cp.color : T.inputBorder}`,
                          background:feelingDraft.energy===o ? cp.color+"22":"transparent",
                          color:feelingDraft.energy===o ? cp.color:T.textDim, cursor:"pointer", fontSize:11, fontFamily:"inherit" }}>{o}</button>
                    ))}
                  </div>
                </div>

                <div style={{ marginBottom:10 }}>
                  <div style={{ fontSize:10, color:T.textMid, marginBottom:6 }}>Mood <span style={{ color:T.textVeryDim }}>(pick all that fit)</span></div>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                    {MOOD_OPTS.map(o => {
                      const on = feelingDraft.mood?.includes(o);
                      return (
                        <button key={o} onClick={() => setFeelingDraft(p=>({...p, mood: toggleArr(p.mood||[], o)}))}
                          style={{ padding:"4px 10px", borderRadius:12, border:`1px solid ${on ? cp.color : T.inputBorder}`,
                            background:on ? cp.color+"22":"transparent",
                            color:on ? cp.color:T.textDim, cursor:"pointer", fontSize:11, fontFamily:"inherit" }}>{o}</button>
                      );
                    })}
                  </div>
                </div>

                <div style={{ marginBottom:10 }}>
                  <div style={{ fontSize:10, color:T.textMid, marginBottom:6 }}>Body <span style={{ color:T.textVeryDim }}>(pick all that fit)</span></div>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                    {BODY_OPTS.map(o => {
                      const on = feelingDraft.body?.includes(o);
                      return (
                        <button key={o} onClick={() => setFeelingDraft(p=>({...p, body: toggleArr(p.body||[], o)}))}
                          style={{ padding:"4px 10px", borderRadius:12, border:`1px solid ${on ? "#5bb8a0" : T.inputBorder}`,
                            background:on ? "#5bb8a022":"transparent",
                            color:on ? "#5bb8a0":"#556", cursor:"pointer", fontSize:11, fontFamily:"inherit" }}>{o}</button>
                      );
                    })}
                  </div>
                </div>

                <div style={{ marginBottom:12 }}>
                  <div style={{ fontSize:10, color:T.textMid, marginBottom:4 }}>Notes — anything else worth remembering</div>
                  <textarea value={feelingDraft.notes||""} onChange={e=>setFeelingDraft(p=>({...p,notes:e.target.value}))}
                    placeholder="How training felt, symptoms, what helped, what didn't..."
                    style={{ background:T.input, border:`1px solid ${T.inputBorder}`, borderRadius:5, padding:"7px 10px", color:T.text, fontSize:12, fontFamily:"inherit", width:"100%", boxSizing:"border-box", resize:"vertical", minHeight:60 }} />
                </div>

                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={() => { saveFeeling(selectedDate, {...feelingDraft, phase:feelingDraft.phase||cyclePhase}); setShowFeelingForm(false); }}
                    style={{ padding:"6px 16px", background:cp.color, border:"none", borderRadius:5, color:T.bg, cursor:"pointer", fontSize:12, fontFamily:"inherit", fontWeight:600 }}>Save</button>
                  <button onClick={() => setShowFeelingForm(false)}
                    style={{ padding:"6px 14px", background:"transparent", border:`1px solid ${T.inputBorder}`, borderRadius:5, color:T.textDim, cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>Cancel</button>
                </div>
              </div>
            )}
          </div>

          {/* Recent feelings log */}
          {recentFeelings.length > 0 && (
            <div style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:9, padding:14 }}>
              <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.12em", color:T.textFaint, marginBottom:12 }}>Recent entries</div>
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {recentFeelings.map(([date, entry]) => {
                  const ph = CYCLE_PHASES[entry.phase];
                  const flow = bleedDays[date];
                  const flowInfo = flow ? FLOW_LEVELS.find(f=>f.key===flow) : null;
                  return (
                    <div key={date} onClick={() => { setSelectedDate(date); setCalMonth({y:parseInt(date.slice(0,4)), m:parseInt(date.slice(5,7))-1}); }}
                      style={{ background:ph ? ph.bg : T.surface, border:`1px solid ${T.border}`, borderRadius:7, padding:"10px 12px", cursor:"pointer" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                        <span style={{ fontSize:12, color:T.text }}>{new Date(date+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}</span>
                        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                          {flowInfo && <span style={{ fontSize:13, color:flowInfo.color }}>{flowInfo.dot} {flowInfo.label}</span>}
                          {ph && <span style={{ fontSize:10, padding:"1px 7px", borderRadius:10, background:ph.color+"22", color:ph.color }}>{ph.label}</span>}
                        </div>
                      </div>
                      <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                        {entry.energy && <span style={{ fontSize:11, color:T.textMid }}>{entry.energy}</span>}
                        {entry.mood?.map(m => <span key={m} style={{ fontSize:11, color:T.textDim }}>{m}</span>)}
                        {entry.body?.map(b => <span key={b} style={{ fontSize:11, color:"#567" }}>{b}</span>)}
                      </div>
                      {entry.notes && <div style={{ fontSize:11, color:T.textDim, fontStyle:"italic", marginTop:4 }}>{entry.notes}</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── PHASE GUIDE TAB ── */}
      {tab === "phase" && (
        <div>
          <div style={{ background:cp.bg, border:`1px solid ${cp.color}33`, borderRadius:10, padding:16, marginBottom:16 }}>
            <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" }}>
              {Object.entries(CYCLE_PHASES).map(([k,v]) => (
                <button key={k} onClick={() => updateCycle(k, k===cyclePhase?cycleDay:1)} style={{
                  padding:"5px 12px", borderRadius:14, border:`1px solid ${cyclePhase===k ? v.color : T.inputBorder}`,
                  background: cyclePhase===k ? v.color+"22" : "transparent",
                  color: cyclePhase===k ? v.color : "#445", cursor:"pointer", fontSize:12, fontFamily:"inherit",
                }}>{v.label}</button>
              ))}
            </div>
            <div style={{ fontSize:18, color:cp.color, marginBottom:3 }}>{cp.label} · {cp.days}</div>
            <div style={{ fontSize:12, color:cp.color+"bb", fontStyle:"italic", marginBottom:8 }}>{cp.theme}</div>
            <div style={{ fontSize:11, color:T.textDim, marginBottom:2 }}>Brain state: {cp.brain}</div>
            <div style={{ fontSize:11, color:T.textDim }}>Nervous system needs: {cp.nsNeeds}</div>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            {[
              { label:"Strengths", items:cp.strengths, color:cp.color },
              { label:"Movement", items:cp.movement, color:"#5bb8a0" },
              { label:"Work Focus", items:cp.workFocus, color:ACCENT.blue },
              { label:"Creative", items:cp.creative, color:"#a07cc4" },
              { label:"Foods", items:cp.foods, color:"#7ab87a" },
              { label:"Herbs", items:cp.herbs, color:"#5bb8a0" },
              { label:"Home & Relationship", items:cp.home, color:"#a07cc4" },
              { label:"Body changes", items:cp.body, color:cp.color },
            ].map(s => (
              <div key={s.label} style={{ background:T.card, borderRadius:7, padding:"10px 12px", border:`1px solid ${T.border}` }}>
                <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.12em", color:s.color, marginBottom:6 }}>{s.label}</div>
                {s.items.map((item,i) => <div key={i} style={{ fontSize:11, color:T.textMid, marginBottom:3, paddingLeft:8, borderLeft:`1px solid ${s.color}44` }}>{item}</div>)}
              </div>
            ))}
          </div>
          {cp.avoid && <div style={{ marginTop:12, fontSize:11, color:"#665", background:"#151200", borderRadius:6, padding:"8px 12px", borderLeft:`2px solid #665` }}>⚠️ Avoid: {cp.avoid}</div>}
          <div style={{ marginTop:10, fontSize:12, color:cp.color, background:cp.bg, borderRadius:6, padding:"8px 12px", fontStyle:"italic" }}>🌊 Training: {cp.trainingNote}</div>
        </div>
      )}

      {/* ── MOON TAB ── */}
      {tab === "moon" && (
        <div>
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            {upcomingMoons.map(m => {
              const isFull = m.type === "full";
              const mc = isFull ? "#f5d070" : "#a0b8e8";
              return (
                <div key={m.date} style={{ background:T.card, border:`1px solid ${mc}33`, borderRadius:9, padding:14 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                    <span style={{ fontSize:22 }}>{isFull ? "🌕" : "🌑"}</span>
                    <div>
                      <div style={{ fontSize:14, color:mc }}>{m.name}</div>
                      <div style={{ fontSize:11, color:T.textMid }}>{formatMoonDate(m.date)} · {isFull?"Full Moon":"New Moon"}</div>
                      <div style={{ fontSize:12, color:T.textMid, fontStyle:"italic" }}>{m.theme}</div>
                    </div>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                    <div style={{ background:T.bg, borderRadius:6, padding:"10px 12px" }}>
                      <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.1em", color:mc+"99", marginBottom:6 }}>Ritual ({isFull?"20–30":"15–20"} min)</div>
                      {(isFull ? FULL_MOON_RITUAL : NEW_MOON_RITUAL).map((r,i) => <div key={i} style={{ fontSize:11, color:T.textMid, marginBottom:4 }}>· {r}</div>)}
                    </div>
                    <div style={{ background:T.bg, borderRadius:6, padding:"10px 12px" }}>
                      <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.1em", color:mc+"99", marginBottom:6 }}>Use for</div>
                      {(isFull
                        ? ["Evaluation + truth","Pattern recognition","Emotional clearing","Measure → extract → refine"]
                        : ["Intention setting","Programme direction","Offer clarity","Decide → define → commit"]
                      ).map((r,i) => <div key={i} style={{ fontSize:11, color:T.textMid, marginBottom:4 }}>· {r}</div>)}
                      <div style={{ marginTop:8, fontSize:10, textTransform:"uppercase", letterSpacing:"0.1em", color:mc+"99", marginBottom:4 }}>Movement prompt</div>
                      {(isFull
                        ? ["Shake-out movement 2–3 min","Strong walking or stair climbing","Voice release — sound, humming"]
                        : ["Slow walk outdoors at night","10 deep breaths hands on womb + heart","Gentle hip circles"]
                      ).map((r,i) => <div key={i} style={{ fontSize:11, color:T.textMid, marginBottom:4 }}>· {r}</div>)}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Full 2026 moon list */}
          <div style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:9, padding:14, marginTop:16 }}>
            <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.12em", color:T.textFaint, marginBottom:12 }}>All 2026 Moons — Summer</div>
            {MOONS_2026.map(m => {
              const isFull = m.type==="full";
              const mc = isFull ? "#f5d070" : "#a0b8e8";
              const isPast = new Date(m.date) < new Date();
              return (
                <div key={m.date} style={{ display:"flex", gap:10, alignItems:"flex-start", padding:"6px 0", borderBottom:`1px solid ${T.border}`, opacity:isPast?0.4:1 }}>
                  <span style={{ fontSize:14, minWidth:20 }}>{isFull?"🌕":"🌑"}</span>
                  <div style={{ flex:1 }}>
                    <span style={{ fontSize:12, color:mc }}>{m.name}</span>
                    <span style={{ fontSize:11, color:T.textMid, marginLeft:8 }}>{formatMoonDate(m.date)}</span>
                  </div>
                  <div style={{ fontSize:11, color:T.textDim, fontStyle:"italic", maxWidth:200, textAlign:"right" }}>{m.theme}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── CAMP VIEW COMPONENT ──────────────────────────────────────────────────────
function CampView({ T, ac, todayStr, todayDow, campChecks, toggleCampCheck, campNotes, saveCampNote, addManualEntry }) {
  const [tab, setTab] = useState("daily");
  const [logFor, setLogFor] = useState(null); // { id, text }
  const [logDraft, setLogDraft] = useState({ whatDid:"", why:"", lessons:"" });
  const [editingNote, setEditingNote] = useState(null);
  const [noteDraft, setNoteDraft] = useState("");

  function keyFor(period, id) { return `${todayStr}_${period}_${id}`; }

  function openLog(period, item) {
    setLogFor({ key: keyFor(period, item.id), text: item.text });
    setLogDraft({ whatDid:"", why:"", lessons:"" });
  }

  function saveLog() {
    if (!logFor) return;
    addManualEntry({
      checklistItemId: logFor.key,
      checklistItemText: logFor.text,
      whatDid: logDraft.whatDid, why: logDraft.why, lessons: logDraft.lessons,
    });
    setLogFor(null);
  }

  const iS = { background:T.input, border:`1px solid ${T.inputBorder}`, borderRadius:5,
    padding:"7px 10px", color:T.text, fontSize:12, fontFamily:"inherit", width:"100%", boxSizing:"border-box" };

  function ChecklistItem({ item, period }) {
    const key = keyFor(period, item.id);
    const done = !!campChecks[key];
    const note = campNotes[key] || "";
    const isEditingNote = editingNote === key;
    return (
      <div style={{ marginBottom:6 }}>
        <div style={{ display:"flex", alignItems:"flex-start", gap:9 }}>
          <div onClick={() => toggleCampCheck(key)} style={{
            width:16, height:16, borderRadius:4, marginTop:2, flexShrink:0, cursor:"pointer",
            border:`1px solid ${done ? ac : (item.critical ? "#c45050" : T.border)}`,
            background: done ? ac : "transparent",
            display:"flex", alignItems:"center", justifyContent:"center",
          }}>{done && <span style={{ fontSize:10, color:"#fff" }}>✓</span>}</div>
          <div style={{ flex:1 }}>
            <span style={{ fontSize:13, color: done ? T.textFaint : T.textSub, textDecoration: done?"line-through":"none" }}>
              {item.text}{item.critical && <span style={{ color:"#c45050", marginLeft:5, fontSize:11 }}>⚠</span>}
            </span>
            <div style={{ display:"flex", gap:10, marginTop:2 }}>
              <button onClick={() => openLog(period, item)} style={{ background:"none", border:"none", color:ac+"aa", cursor:"pointer", fontSize:10, fontFamily:"inherit", padding:0 }}>+ log for manual</button>
              <button onClick={() => { setEditingNote(isEditingNote?null:key); setNoteDraft(note); }} style={{ background:"none", border:"none", color:T.textFaint, cursor:"pointer", fontSize:10, fontFamily:"inherit", padding:0 }}>{note?"edit note":"+ note"}</button>
            </div>
            {note && !isEditingNote && <div style={{ fontSize:11, color:T.textDim, fontStyle:"italic", marginTop:3 }}>{note}</div>}
            {isEditingNote && (
              <div style={{ display:"flex", gap:6, marginTop:4 }}>
                <input value={noteDraft} onChange={e=>setNoteDraft(e.target.value)} style={iS} placeholder="Quick note..." />
                <button onClick={() => { saveCampNote(key, noteDraft); setEditingNote(null); }} style={{ background:ac, border:"none", borderRadius:4, color:"#fff", padding:"0 12px", cursor:"pointer", fontSize:11 }}>Save</button>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{ marginBottom:16 }}>
        <h2 style={{ fontSize:17, fontWeight:400, margin:"0 0 4px", color:ac }}>Camp Management</h2>
        <p style={{ margin:0, fontSize:12, color:T.textMid, fontStyle:"italic" }}>Moorlands Acting Manager · {todayDow}, {new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long"})}</p>
      </div>

      <div style={{ display:"flex", gap:0, borderBottom:`1px solid ${T.border}`, marginBottom:16, flexWrap:"wrap" }}>
        {[["daily","Daily"],["weekly","Weekly"],["saturday","Saturday"],["standing","Standing"],["contacts","Contacts"]].map(([v,l]) => (
          <button key={v} onClick={() => setTab(v)} style={{
            padding:"6px 12px", background:"none", border:"none",
            borderBottom: tab===v ? `2px solid ${ac}` : "2px solid transparent",
            color: tab===v ? ac : T.textFaint, cursor:"pointer", fontSize:12, fontFamily:"inherit", marginBottom:-1,
          }}>{l}</button>
        ))}
      </div>

      {/* DAILY */}
      {tab === "daily" && (
        <div>
          {Object.entries(CAMP_DAILY).map(([period, data]) => (
            <div key={period} style={{ marginBottom:16, background:T.surface, border:`1px solid ${T.border}`, borderRadius:9, padding:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
                <span style={{ fontSize:13, color:T.text, fontWeight:600 }}>{data.label}</span>
                <span style={{ fontSize:11, color:T.textFaint }}>{data.time}</span>
              </div>
              {data.groups.map(g => (
                <div key={g.group} style={{ marginBottom:12 }}>
                  <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.1em", color:T.textDim, marginBottom:6 }}>{g.group}</div>
                  {g.items.map(item => <ChecklistItem key={item.id} item={item} period={period} />)}
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      {/* WEEKLY */}
      {tab === "weekly" && (
        <div>
          {DAYS.map(d => {
            const data = CAMP_WEEKLY[d];
            if (!data) return null;
            const isToday = d === todayDow;
            return (
              <div key={d} style={{ marginBottom:14, background:T.surface, border:`1px solid ${isToday?ac+"66":T.border}`, borderRadius:9, padding:14 }}>
                <div style={{ marginBottom:8 }}>
                  <span style={{ fontSize:13, color: isToday?ac:T.text, fontWeight:600 }}>{data.label}</span>
                  {isToday && <span style={{ fontSize:9, background:ac+"33", color:ac, padding:"1px 7px", borderRadius:10, marginLeft:8 }}>TODAY</span>}
                </div>
                <div style={{ fontSize:11, color:T.textDim, fontStyle:"italic", marginBottom:8 }}>{data.note}</div>
                {data.items.length === 0 ? (
                  <div style={{ fontSize:12, color:T.textFaint }}>See Saturday Turnaround tab for full protocol.</div>
                ) : data.items.map(item => <ChecklistItem key={item.id} item={item} period={`weekly_${d}`} />)}
              </div>
            );
          })}
        </div>
      )}

      {/* SATURDAY */}
      {tab === "saturday" && (
        <div>
          <div style={{ background:ac+"15", border:`1px solid ${ac}44`, borderRadius:8, padding:"10px 14px", marginBottom:14, fontSize:12, color:T.textSub, fontStyle:"italic" }}>
            Think of this like a relay race — the baton (the camp) must be fully handed off before the next runner (incoming group) can begin.
          </div>
          {CAMP_SATURDAY.map(phase => (
            <div key={phase.phase} style={{ marginBottom:16, background:T.surface, border:`1px solid ${T.border}`, borderRadius:9, padding:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                <span style={{ fontSize:13, color:ac, fontWeight:600 }}>{phase.phase}</span>
                {phase.time && <span style={{ fontSize:11, color:T.textFaint }}>{phase.time}</span>}
              </div>
              {phase.target && <div style={{ fontSize:11, color:T.textDim, fontStyle:"italic", marginBottom:10 }}>⚠ Target: {phase.target}</div>}
              {phase.items.map(item => <ChecklistItem key={item.id} item={item} period={`sat_${phase.phase}`} />)}
            </div>
          ))}
        </div>
      )}

      {/* STANDING */}
      {tab === "standing" && (
        <div>
          {CAMP_STANDING.map(s => (
            <div key={s.group} style={{ marginBottom:14, background:T.surface, border:`1px solid ${T.border}`, borderRadius:9, padding:14 }}>
              <div style={{ fontSize:12, color:T.text, fontWeight:600, marginBottom:8 }}>{s.group}</div>
              {s.items.map((it,i) => <div key={i} style={{ fontSize:12, color:T.textSub, marginBottom:6, paddingLeft:10, borderLeft:`2px solid ${ac}44` }}>{it}</div>)}
            </div>
          ))}
          <div style={{ background:"#c4505015", border:"1px solid #c4505044", borderRadius:9, padding:14 }}>
            <div style={{ fontSize:12, color:"#c45050", fontWeight:600, marginBottom:8 }}>Five Rules You Cannot Break</div>
            {CAMP_FIVE_RULES.map((r,i) => <div key={i} style={{ fontSize:12, color:T.textSub, marginBottom:6, paddingLeft:10, borderLeft:"2px solid #c4505066" }}>{r}</div>)}
          </div>
        </div>
      )}

      {/* CONTACTS */}
      {tab === "contacts" && (
        <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:9, padding:14 }}>
          {CAMP_CONTACTS.map(c => (
            <div key={c.name} style={{ padding:"8px 0", borderBottom:`1px solid ${T.border}` }}>
              <div style={{ fontSize:13, color:T.text }}>{c.name}</div>
              <div style={{ fontSize:11, color:ac }}>{c.role}</div>
              <div style={{ fontSize:11, color:T.textDim, marginTop:2 }}>{c.when}</div>
            </div>
          ))}
        </div>
      )}

      {/* Log modal */}
      {logFor && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"center", justifyContent:"center", padding:20, zIndex:100 }}
          onClick={() => setLogFor(null)}>
          <div onClick={e=>e.stopPropagation()} style={{ background:T.card, border:`1px solid ${ac}55`, borderRadius:10, padding:18, maxWidth:420, width:"100%" }}>
            <div style={{ fontSize:13, color:ac, marginBottom:4 }}>Log for Manual</div>
            <div style={{ fontSize:11, color:T.textFaint, marginBottom:12 }}>{logFor.text}</div>
            <div style={{ marginBottom:8 }}>
              <label style={{ fontSize:10, color:T.textMid, display:"block", marginBottom:3 }}>What did you do?</label>
              <textarea value={logDraft.whatDid} onChange={e=>setLogDraft(p=>({...p,whatDid:e.target.value}))} style={{...iS, minHeight:50, resize:"vertical"}} />
            </div>
            <div style={{ marginBottom:8 }}>
              <label style={{ fontSize:10, color:T.textMid, display:"block", marginBottom:3 }}>Why? (reasoning, context)</label>
              <textarea value={logDraft.why} onChange={e=>setLogDraft(p=>({...p,why:e.target.value}))} style={{...iS, minHeight:50, resize:"vertical"}} />
            </div>
            <div style={{ marginBottom:14 }}>
              <label style={{ fontSize:10, color:T.textMid, display:"block", marginBottom:3 }}>Lessons / notes for next time</label>
              <textarea value={logDraft.lessons} onChange={e=>setLogDraft(p=>({...p,lessons:e.target.value}))} style={{...iS, minHeight:50, resize:"vertical"}} />
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={saveLog} style={{ padding:"7px 18px", background:ac, border:"none", borderRadius:5, color:"#fff", cursor:"pointer", fontSize:12, fontWeight:600 }}>Save to Manual</button>
              <button onClick={() => setLogFor(null)} style={{ padding:"7px 14px", background:"transparent", border:`1px solid ${T.border}`, borderRadius:5, color:T.textMid, cursor:"pointer", fontSize:12 }}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── MOCHA VIEW COMPONENT ─────────────────────────────────────────────────────
function MochaView({ T, todayStr, phase, mochaSessionLog, toggleMochaSession,
  mochaCommandScores, setMochaCommandScore, mochaBitingLog, addMochaBitingEntry, removeMochaBitingEntry,
  mochaPottyLog, saveMochaPotty, mochaWeeklyNotes, saveMochaWeeklyNote }) {
  const [tab, setTab] = useState("today");
  const [bitingDraft, setBitingDraft] = useState({ time:"", trigger:"", energyBurn:"", response:"", notes:"" });
  const phaseInfo = MOCHA_PHASES.find(p => p.key === phase);
  const todaySessions = mochaSessionLog[todayStr] || {};

  const iS = { background:T.input, border:`1px solid ${T.inputBorder}`, borderRadius:5,
    padding:"6px 9px", color:T.text, fontSize:12, fontFamily:"inherit", boxSizing:"border-box" };

  // Compute approximate week number from June 17 start
  function weekKeyForToday() {
    const start = new Date("2026-06-17");
    const today = new Date();
    const wk = Math.floor((today - start) / (7*24*60*60*1000)) + 1;
    return `wk${Math.max(1, wk)}`;
  }
  const currentWeekKey = weekKeyForToday();

  return (
    <div>
      <div style={{ marginBottom:16 }}>
        <h2 style={{ fontSize:17, fontWeight:400, margin:"0 0 4px", color:phaseInfo.color }}>Mocha — Training</h2>
        <p style={{ margin:0, fontSize:12, color:T.textMid, fontStyle:"italic" }}>Stonnie Dennis Method · {phaseInfo.label} · {phaseInfo.dates}</p>
      </div>

      <div style={{ display:"flex", gap:6, marginBottom:16, flexWrap:"wrap" }}>
        {MOCHA_PHASES.map(p => (
          <div key={p.key} style={{
            padding:"4px 11px", borderRadius:14, fontSize:11,
            border:`1px solid ${phase===p.key ? p.color : T.border}`,
            background: phase===p.key ? p.color+"22" : "transparent",
            color: phase===p.key ? p.color : T.textFaint,
          }}>{p.label}</div>
        ))}
      </div>

      <div style={{ display:"flex", gap:0, borderBottom:`1px solid ${T.border}`, marginBottom:16, flexWrap:"wrap" }}>
        {[["today","Today"],["commands","Commands"],["biting","Biting Log"],["potty","Potty"],["weekly","Weekly Review"],["reference","Quick Reference"]].map(([v,l]) => (
          <button key={v} onClick={() => setTab(v)} style={{
            padding:"6px 12px", background:"none", border:"none",
            borderBottom: tab===v ? `2px solid ${phaseInfo.color}` : "2px solid transparent",
            color: tab===v ? phaseInfo.color : T.textFaint, cursor:"pointer", fontSize:12, fontFamily:"inherit", marginBottom:-1,
          }}>{l}</button>
        ))}
      </div>

      {/* TODAY */}
      {tab === "today" && (
        <div>
          <div style={{ background:phaseInfo.color+"15", border:`1px solid ${phaseInfo.color}33`, borderRadius:8, padding:"10px 14px", marginBottom:14, fontSize:12, color:T.textSub, fontStyle:"italic" }}>
            {phaseInfo.goal}
          </div>
          {MOCHA_SESSION_TEMPLATE.map(s => {
            const done = !!todaySessions[s.id];
            return (
              <div key={s.id} onClick={() => toggleMochaSession(todayStr, s.id)} style={{
                display:"flex", alignItems:"flex-start", gap:10, cursor:"pointer",
                background: done ? phaseInfo.color+"10" : T.surface,
                border:`1px solid ${done?phaseInfo.color+"44":T.border}`, borderRadius:8, padding:"10px 12px", marginBottom:8,
              }}>
                <span style={{ fontSize:18 }}>{s.icon}</span>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, color: done?phaseInfo.color:T.text, textDecoration:done?"line-through":"none" }}>{s.label}</div>
                  <div style={{ fontSize:11, color:T.textDim, marginTop:2 }}>{s.note}</div>
                </div>
                <div style={{ width:16, height:16, borderRadius:4, marginTop:2, flexShrink:0,
                  border:`1px solid ${done?phaseInfo.color:T.border}`, background:done?phaseInfo.color:"transparent",
                  display:"flex", alignItems:"center", justifyContent:"center" }}>
                  {done && <span style={{ fontSize:10, color:"#fff" }}>✓</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* COMMANDS */}
      {tab === "commands" && (
        <div>
          <div style={{ fontSize:11, color:T.textDim, marginBottom:12, fontStyle:"italic" }}>Rating: 1=Not started · 2=Introduced · 3=Learning · 4=Solid at home · 5=Solid in 3 environments. Update every Friday.</div>
          {MOCHA_COMMANDS.map(cmd => (
            <div key={cmd} style={{ marginBottom:10, background:T.surface, border:`1px solid ${T.border}`, borderRadius:7, padding:"10px 12px" }}>
              <div style={{ fontSize:13, color:T.text, marginBottom:6 }}>{cmd}</div>
              <div style={{ display:"flex", gap:6 }}>
                {[1,2,3,4,5].map(score => {
                  const current = mochaCommandScores[cmd]?.[currentWeekKey];
                  return (
                    <button key={score} onClick={() => setMochaCommandScore(cmd, currentWeekKey, score)} style={{
                      width:30, height:30, borderRadius:6, fontSize:12, cursor:"pointer",
                      border:`1px solid ${current===score ? phaseInfo.color : T.border}`,
                      background: current===score ? phaseInfo.color+"33" : "transparent",
                      color: current===score ? phaseInfo.color : T.textFaint,
                    }}>{score}</button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* BITING LOG */}
      {tab === "biting" && (
        <div>
          <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:9, padding:14, marginBottom:16 }}>
            <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.1em", color:T.textMid, marginBottom:10 }}>Log an incident</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
              <input value={bitingDraft.time} onChange={e=>setBitingDraft(p=>({...p,time:e.target.value}))} placeholder="Time" style={iS} />
              <input value={bitingDraft.energyBurn} onChange={e=>setBitingDraft(p=>({...p,energyBurn:e.target.value}))} placeholder="Energy burn before? Y/N" style={iS} />
            </div>
            <input value={bitingDraft.trigger} onChange={e=>setBitingDraft(p=>({...p,trigger:e.target.value}))} placeholder="Trigger / context" style={{...iS, width:"100%", marginBottom:8}} />
            <input value={bitingDraft.response} onChange={e=>setBitingDraft(p=>({...p,response:e.target.value}))} placeholder="Response used" style={{...iS, width:"100%", marginBottom:8}} />
            <input value={bitingDraft.notes} onChange={e=>setBitingDraft(p=>({...p,notes:e.target.value}))} placeholder="Notes" style={{...iS, width:"100%", marginBottom:10}} />
            <button onClick={() => { addMochaBitingEntry({...bitingDraft, date: todayStr}); setBitingDraft({time:"",trigger:"",energyBurn:"",response:"",notes:""}); }}
              style={{ padding:"6px 16px", background:phaseInfo.color, border:"none", borderRadius:5, color:"#fff", cursor:"pointer", fontSize:12, fontWeight:600 }}>Log incident</button>
          </div>
          {mochaBitingLog.map(e => (
            <div key={e.id} style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:7, padding:"10px 12px", marginBottom:8 }}>
              <div style={{ display:"flex", justifyContent:"space-between" }}>
                <span style={{ fontSize:12, color:T.text }}>{e.date} {e.time && `· ${e.time}`}</span>
                <button onClick={() => removeMochaBitingEntry(e.id)} style={{ background:"none", border:"none", color:T.textFaint, cursor:"pointer" }}>✕</button>
              </div>
              {e.trigger && <div style={{ fontSize:11, color:T.textSub, marginTop:3 }}>Trigger: {e.trigger}</div>}
              {e.response && <div style={{ fontSize:11, color:T.textDim }}>Response: {e.response}</div>}
              {e.notes && <div style={{ fontSize:11, color:T.textFaint, fontStyle:"italic" }}>{e.notes}</div>}
            </div>
          ))}
        </div>
      )}

      {/* POTTY */}
      {tab === "potty" && (
        <div>
          {(() => {
            const data = mochaPottyLog[currentWeekKey] || {};
            return (
              <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:9, padding:14 }}>
                <div style={{ fontSize:12, color:T.text, marginBottom:10 }}>This week ({currentWeekKey})</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
                  <div>
                    <label style={{ fontSize:10, color:T.textMid, display:"block", marginBottom:3 }}>Accidents indoors</label>
                    <input value={data.accidents||""} onChange={e=>saveMochaPotty(currentWeekKey,{accidents:e.target.value})} style={{...iS,width:"100%"}} />
                  </div>
                  <div>
                    <label style={{ fontSize:10, color:T.textMid, display:"block", marginBottom:3 }}>Successes at spot</label>

          </div>
          <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:9, padding:14, marginBottom:14 }}>
            <div style={{ fontSize:12, color:phaseInfo.color, marginBottom:8 }}>Biting Response — same for every person</div>
            {MOCHA_BITING_PROTOCOL.map((b,i) => (
              <div key={i} style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                <span style={{ fontSize:12, color:T.textSub }}>{b.situation}</span>
                <span style={{ fontSize:12, color:T.textDim }}>{b.response}</span>
              </div>
            ))}
            <div style={{ fontSize:11, color:"#c45050", marginTop:8 }}>NEVER laugh · push · yell · spray · tap nose</div>
          </div>
          <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:9, padding:14 }}>
            <div style={{ fontSize:12, color:phaseInfo.color, marginBottom:8 }}>Crate Law</div>
            {MOCHA_CRATE_LAW.map((c,i) => <div key={i} style={{ fontSize:12, color:T.textSub, marginBottom:5 }}>· {c}</div>)}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {

  const [editWorkout, setEditWorkout] = useState(null); // dk string

  // Camp management
  const [campChecks, setCampChecks] = useState({}); // { "2026-07-05_morning_water_am": true }

  // Mocha training
  const [mochaSessionLog, setMochaSessionLog] = useState({}); // { "2026-06-17": { energy_burn: true, training: true, ... } }
  const [mochaCommandScores, setMochaCommandScores] = useState({}); // { "Sit": { wk1: 3, wk3: 4, ... } }
  const [mochaBitingLog, setMochaBitingLog] = useState([]);
  const [mochaPottyLog, setMochaPottyLog] = useState({}); // { weekKey: { accidents, successes, pattern, adjustment } }

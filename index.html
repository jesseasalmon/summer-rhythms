  // SOP Manual
  const [manualEntries, setManualEntries] = useState([]); // [{ id, date, checklistItemId, checklistItemText, whatDid, why, lessons }]

  // Homeschool
  const [homeschoolLog, setHomeschoolLog] = useState({}); // { "2026-07-05": { handwriting: true, skill: "Art", skillNotes: "..." } }

  // Daily non-negotiables (every day, every category)
  const [dailyMustsLog, setDailyMustsLog] = useState({}); // { "2026-07-05": { breathwork_skool: true, four_part_breath: true, dive_video: true } }

  // Today's freeform to-do list, broken down by category
  const [todoLog, setTodoLog] = useState({}); // { "2026-07-05": [{ id, category, text, done }] }
  const [newTodoText, setNewTodoText] = useState("");
  const [newTodoCategory, setNewTodoCategory] = useState("Dive Training");

  // Training log
  const [staticLog, setStaticLog] = useState([]);
  const [newStatic, setNewStatic] = useState({ date:"", rhr:"", h1:"", h2:"", h3:"", notes:"" });

  // Life admin
  const [bills, setBills] = useState([]);
  const [newBill, setNewBill] = useState({ name:"", dueDay:"", amount:"" });
  const [weeklyReflection, setWeeklyReflection] = useState("");
  const [editReflection, setEditReflection] = useState(false);
  const [reflectionText, setReflectionText] = useState("");
  const [mealPlan, setMealPlan] = useState({});
  const [editMeal, setEditMeal] = useState(null);
  const [mealText, setMealText] = useState("");

  const ac = PHASE_META[trainingPhase].color;
  const weeks = WEEKS[trainingPhase];
  const currentWeek = weeks[weekIdx];
  const cp = CYCLE_PHASES[cyclePhase];
  const todayDay = todayDayName();
  const inputStyle = getInputStyle(T);
  const labelStyle = getLabelStyle(T);

  // Storage — uses localStorage for standalone PWA
  useEffect(() => {
    try {
      const raw = localStorage.getItem("rhythm_v3");
      if (raw) {
        const d = JSON.parse(raw);
        // Version check — if data is from old version, preserve user data but ignore stale UI state
        setChecked(d.checked || {});
        setDayNotes(d.dayNotes || {});
        setStaticLog(d.staticLog || []);
        setBills(d.bills || []);
        setWeeklyReflection(d.weeklyReflection || "");
        setMealPlan(d.mealPlan || {});
        setBleedDays(d.bleedDays || {});
        setFeelingsLog(d.feelingsLog || {});
        setWorkoutLog(d.workoutLog || {});
        setCampChecks(d.campChecks || {});
        setCampNotes(d.campNotes || {});
        setMochaSessionLog(d.mochaSessionLog || {});
        setMochaCommandScores(d.mochaCommandScores || {});
        setMochaBitingLog(d.mochaBitingLog || []);
        setMochaPottyLog(d.mochaPottyLog || {});
        setMochaWeeklyNotes(d.mochaWeeklyNotes || {});
        setManualEntries(d.manualEntries || []);
        setHomeschoolLog(d.homeschoolLog || {});
        setDailyMustsLog(d.dailyMustsLog || {});
        setTodoLog(d.todoLog || {});
        if (d.cyclePhase) setCyclePhase(d.cyclePhase);
        if (d.cycleStartDate) {
          setCycleStartDate(d.cycleStartDate);
          // Auto-calculate cycle day from start date
          const startDate = new Date(d.cycleStartDate);
          const today = new Date();
          const daysSinceStart = Math.floor((today - startDate) / (1000*60*60*24));
          const cycleLength = 28;
          const currentDay = (daysSinceStart % cycleLength) + 1;
          if (currentDay >= 1 && currentDay <= 35) setCycleDay(currentDay);
          // Auto-set phase based on day
          if (currentDay <= 7) setCyclePhase("menstrual");
          else if (currentDay <= 13) setCyclePhase("follicular");
          else if (currentDay <= 16) setCyclePhase("ovulatory");
          else setCyclePhase("luteal");
        } else if (d.cyclePhase) {
          setCyclePhase(d.cyclePhase);
          if (d.cycleDay) setCycleDay(d.cycleDay);
        }
        if (d.darkMode !== undefined) setDarkMode(d.darkMode);
        if (d.injuryMode !== undefined) setInjuryMode(d.injuryMode);
      }
    } catch {}
    // Phase and week are computed from date — nothing to set here
  }, []);

  function persist(updates) {
    try {
      const data = { checked, dayNotes, staticLog, bills, weeklyReflection, mealPlan,
        cyclePhase, cycleDay, cycleStartDate, bleedDays, feelingsLog, workoutLog, darkMode, injuryMode,
        campChecks, campNotes, mochaSessionLog, mochaCommandScores, mochaBitingLog,
        mochaPottyLog, mochaWeeklyNotes, manualEntries, homeschoolLog, dailyMustsLog, todoLog, ...updates };
      localStorage.setItem("rhythm_v3", JSON.stringify(data));
    } catch {}
  }

  function toggleDark() {
    const next = !darkMode;
    setDarkMode(next);
    persist({ darkMode: next });
  }

  function toggleInjury() {
    const next = !injuryMode;
    setInjuryMode(next);
    persist({ injuryMode: next });
  }

  function toggleBleedDay(date, flow) {
    const current = bleedDays[date];
    const next = current === flow ? { ...bleedDays } : { ...bleedDays, [date]: flow };
    if (current === flow) delete next[date];
    setBleedDays(next);
    persist({ bleedDays: next });
  }

  function saveFeeling(date, entry) {
    const next = { ...feelingsLog, [date]: { ...entry, savedAt: Date.now() } };
    setFeelingsLog(next);
    persist({ feelingsLog: next });
  }

  function saveWorkout(dk, data) {
    const next = { ...workoutLog, [dk]: data };
    setWorkoutLog(next);
    persist({ workoutLog: next });
  }

  // ── Camp helpers ──
  function toggleCampCheck(key) {
    const next = { ...campChecks, [key]: !campChecks[key] };
    setCampChecks(next);
    persist({ campChecks: next });
  }

  function saveCampNote(key, text) {
    const next = { ...campNotes, [key]: text };
    setCampNotes(next);
    persist({ campNotes: next });
  }

  // ── Mocha helpers ──
  function toggleMochaSession(dateStr, sessionId) {
    const day = mochaSessionLog[dateStr] || {};
    const next = { ...mochaSessionLog, [dateStr]: { ...day, [sessionId]: !day[sessionId] } };
    setMochaSessionLog(next);
    persist({ mochaSessionLog: next });
  }

  function setMochaCommandScore(command, weekKey, score) {
    const cmd = mochaCommandScores[command] || {};
    const next = { ...mochaCommandScores, [command]: { ...cmd, [weekKey]: score } };
    setMochaCommandScores(next);
    persist({ mochaCommandScores: next });
  }

  function addMochaBitingEntry(entry) {
    const next = [{ ...entry, id: Date.now() }, ...mochaBitingLog].slice(0, 100);
    setMochaBitingLog(next);
    persist({ mochaBitingLog: next });
  }

  function removeMochaBitingEntry(id) {
    const next = mochaBitingLog.filter(e => e.id !== id);
    setMochaBitingLog(next);
    persist({ mochaBitingLog: next });
  }

  function saveMochaPotty(weekKey, data) {
    const next = { ...mochaPottyLog, [weekKey]: { ...(mochaPottyLog[weekKey]||{}), ...data } };
    setMochaPottyLog(next);
    persist({ mochaPottyLog: next });
  }

  function saveMochaWeeklyNote(weekKey, data) {
    const next = { ...mochaWeeklyNotes, [weekKey]: { ...(mochaWeeklyNotes[weekKey]||{}), ...data } };
    setMochaWeeklyNotes(next);
    persist({ mochaWeeklyNotes: next });
  }

  // ── Manual helpers ──
  function addManualEntry(entry) {
    const next = [{ ...entry, id: Date.now(), date: new Date().toISOString().slice(0,10) }, ...manualEntries];
    setManualEntries(next);
    persist({ manualEntries: next });
  }

  function removeManualEntry(id) {
    const next = manualEntries.filter(e => e.id !== id);
    setManualEntries(next);
    persist({ manualEntries: next });
  }

  function exportManual() {
    const grouped = {};
    manualEntries.forEach(e => {
      const key = e.checklistItemText || "General";
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(e);
    });
    let md = `# Moorlands Camps — Acting Manager SOP Manual\n\n*Built in real time, Summer 2026*\n\n`;
    Object.entries(grouped).forEach(([item, entries]) => {
      md += `## ${item}\n\n`;
      entries.sort((a,b) => a.date.localeCompare(b.date)).forEach(e => {
        md += `**${e.date}**\n\n`;
        if (e.whatDid) md += `*What I did:* ${e.whatDid}\n\n`;
        if (e.why) md += `*Why:* ${e.why}\n\n`;
        if (e.lessons) md += `*Lessons / notes for next time:* ${e.lessons}\n\n`;
        md += `---\n\n`;
      });
    });
    const blob = new Blob([md], { type: "text/markdown" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `Moorlands_SOP_Manual_${new Date().toISOString().slice(0,10)}.md`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ── Homeschool helpers ──
  function saveHomeschool(dateStr, data) {
    const next = { ...homeschoolLog, [dateStr]: { ...(homeschoolLog[dateStr]||{}), ...data } };
    setHomeschoolLog(next);
    persist({ homeschoolLog: next });
  }

  // ── Daily musts ──
  function toggleDailyMust(dateStr, mustId) {
    const day = dailyMustsLog[dateStr] || {};
    const next = { ...dailyMustsLog, [dateStr]: { ...day, [mustId]: !day[mustId] } };
    setDailyMustsLog(next);
    persist({ dailyMustsLog: next });
  }

  // ── Today's categorized to-do list ──
  function addTodo(dateStr, category, text) {
    if (!text.trim()) return;
    const dayList = todoLog[dateStr] || [];
    const next = { ...todoLog, [dateStr]: [...dayList, { id: Date.now(), category, text: text.trim(), done:false }] };
    setTodoLog(next);
    persist({ todoLog: next });
  }

  function toggleTodo(dateStr, id) {
    const dayList = todoLog[dateStr] || [];
    const next = { ...todoLog, [dateStr]: dayList.map(t => t.id===id ? {...t, done:!t.done} : t) };
    setTodoLog(next);
    persist({ todoLog: next });
  }

  function removeTodo(dateStr, id) {
    const dayList = todoLog[dateStr] || [];
    const next = { ...todoLog, [dateStr]: dayList.filter(t => t.id!==id) };
    setTodoLog(next);
    persist({ todoLog: next });
  }

  function toggleTask(key) {
    const next = { ...checked, [key]: !checked[key] };
    setChecked(next);
    persist({ checked: next });
  }

  function saveNote(dk) {
    const next = { ...dayNotes, [dk]: noteText };
    setDayNotes(next);
    persist({ dayNotes: next });
    setEditNote(null);
  }

  function addBill() {
    if (!newBill.name) return;
    const next = [...bills, { ...newBill, id: Date.now() }];
    setBills(next);
    persist({ bills: next });
    setNewBill({ name:"", dueDay:"", amount:"" });
  }

  function removeBill(id) {
    const next = bills.filter(b => b.id !== id);
    setBills(next);
    persist({ bills: next });
  }

  function saveReflection() {
    setWeeklyReflection(reflectionText);
    persist({ weeklyReflection: reflectionText });
    setEditReflection(false);
  }

  function saveMeal(day) {
    const next = { ...mealPlan, [day]: mealText };
    setMealPlan(next);
    persist({ mealPlan: next });
    setEditMeal(null);
  }

  function updateCycle(ph, day) {
    setCyclePhase(ph);
    setCycleDay(day);
    persist({ cyclePhase: ph, cycleDay: day });
  }

  const weekPct = (() => {
    let tot=0, done=0;
    DAYS.forEach(d => {
      const s = currentWeek.sessions[d];
      if (!s || s.type === "shabbat") return;
      const dk = `${trainingPhase}_w${weekIdx}_${d}`;
      s.tasks.forEach((_,i) => { tot++; if (checked[`${dk}_${i}`]) done++; });
    });
    return tot===0 ? 0 : Math.round((done/tot)*100);
  })();

  const upcomingMoons = getUpcomingMoons(3);
  const mealDays = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  const NAV = [["home","Home"],["week","Week"],["camp","Camp"],["mocha","Mocha"],["cycle","Cycle & Moon"],["life","Life Admin"],["manual","Manual"],["log","Training Log"]];

  return (
    <div style={{ minHeight:"100vh", background:T.bg, color:T.text, fontFamily:"'Georgia', serif", fontSize:14, transition:"background 0.2s, color 0.2s" }}>

      {/* ── HEADER ── */}
      <div style={{ background:`linear-gradient(180deg, ${T.surface} 0%, transparent 100%)`, borderBottom:`1px solid ${T.border}`, padding:"20px 18px 0" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:10, marginBottom:14 }}>
          <div>
            <div style={{ fontSize:10, letterSpacing:"0.2em", color:ac, textTransform:"uppercase", marginBottom:3 }}>Honeysuckle Motherhood · Summer 2026</div>
            <h1 style={{ margin:0, fontSize:22, fontWeight:400, color:T.text }}>Summer Rhythm</h1>
            <div style={{ fontSize:11, color:T.textMid, marginTop:2 }}>
              {new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})} · {cp.label} phase · Day {cycleDay}
            </div>
          </div>
          <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
            {/* Dark/light toggle */}
            <button onClick={toggleDark} title={darkMode ? "Switch to light mode" : "Switch to dark mode"} style={{
              background: T.muted, border:`1px solid ${T.border}`, borderRadius:20,
              padding:"5px 12px", cursor:"pointer", fontSize:14, display:"flex", alignItems:"center", gap:5,
            }}>
              {darkMode ? "☀️" : "🌙"}
            </button>
            <button onClick={toggleInjury} title={injuryMode ? "Injury mode ON — tap to turn off" : "Tap to enable injury mode"} style={{
              background: injuryMode ? "#c4503015" : T.muted,
              border:`1px solid ${injuryMode ? "#c45030aa" : T.border}`, borderRadius:20,
              padding:"5px 12px", cursor:"pointer", fontSize:13, display:"flex", alignItems:"center", gap:5,
              color: injuryMode ? "#c45030" : T.textFaint, fontFamily:"inherit",
            }}>
              {injuryMode ? "🦶 Injury" : "🦶"}
            </button>
            {/* Training phase display — auto-calculated from date */}
            {Object.entries(PHASE_META).map(([k,v]) => (
              <div key={k} style={{
                padding:"4px 11px", borderRadius:14,
                border:`1px solid ${trainingPhase===k ? v.color : T.border}`,
                background: trainingPhase===k ? v.color+"22" : "transparent",
                color: trainingPhase===k ? v.color : T.textFaint,
                fontSize:11,
              }}>{v.label}</div>
            ))}
          </div>
        </div>

        {/* Cycle phase banner */}
        <div style={{ background:cp.bg, border:`1px solid ${cp.color}33`, borderRadius:7, padding:"8px 14px", marginBottom:14, display:"flex", gap:16, alignItems:"center", flexWrap:"wrap" }}>
          <div style={{ width:10, height:10, borderRadius:"50%", background:cp.color, flexShrink:0 }} />
          <div style={{ flex:1 }}>
            <span style={{ fontSize:12, color:cp.color, fontWeight:600 }}>{cp.label}</span>
            <span style={{ fontSize:11, color:T.textMid, marginLeft:8 }}>{cp.days} · {cp.theme}</span>
          </div>
          <div style={{ fontSize:11, color:T.textDim, fontStyle:"italic" }}>{cp.trainingNote}</div>
        </div>

        {/* Nav */}
        <div style={{ display:"flex", gap:0, borderBottom:`1px solid ${T.border}` }}>
          {NAV.map(([v,l]) => (
            <button key={v} onClick={() => setView(v)} style={{
              padding:"7px 15px", background:"none", border:"none",
              borderBottom: view===v ? `2px solid ${ac}` : "2px solid transparent",
              color: view===v ? ac : T.textFaint, cursor:"pointer", fontSize:12,
              fontFamily:"inherit", marginBottom:-1, letterSpacing:"0.04em",
            }}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{ padding:"18px 16px", maxWidth:840, margin:"0 auto" }}>

        {/* ── HOME DASHBOARD ── */}
        {view === "home" && (() => {
          const normalSession = currentWeek.sessions[todayDay];
          const injurySession = INJURY_SESSIONS[todayDay];
          const activeSession = injuryMode ? injurySession : normalSession;
          const todayDk = `${trainingPhase}_w${weekIdx}_${todayDay}`;
          const tc = activeSession ? getTc(activeSession.type) : ac;
          const isShabbat = activeSession?.type === "shabbat";
          const todayWod = workoutLog[todayDk];
          const todayStr = new Date().toISOString().slice(0,10);

          // ── AUTO-AGGREGATED "EVERYTHING TODAY" LIST ──
          const aggregatedToday = [];

          // 1. Training — normal or injury-modified session tasks
          if (activeSession && !isShabbat) {
            const injuryLabel = injurySession?.label || "Modified Session";
            const sessionColor = injuryMode
              ? (activeSession.type === "pool-apnea" ? TRAINING_C.pool : activeSession.type === "dry" ? TRAINING_C.dry : TRAINING_C.strength)
              : TRAINING_C.pool;
            const sessionIcon = injuryMode
              ? (activeSession.type === "pool-apnea" ? "🌊" : activeSession.type === "dry" ? "🌬" : "💪")
              : "🌊";
            activeSession.tasks.forEach((task, ti) => {
              aggregatedToday.push({
                category: injuryMode ? injuryLabel : "Dive Training",
                color: sessionColor, icon: sessionIcon,
                text:task, done: !!checked[`${todayDk}_${ti}`],
                onToggle: () => toggleTask(`${todayDk}_${ti}`),
              });
            });
          }

          // 2. Daily Musts
          DAILY_MUSTS.forEach(m => {
            aggregatedToday.push({
              category:"Daily Musts", color:"#5bb8a0", icon:m.icon,
              text:m.label, done: !!(dailyMustsLog[todayStr]||{})[m.id],
              onToggle: () => toggleDailyMust(todayStr, m.id),
            });
          });

          // 3. Camp — morning/midday/evening checklist items for today
          Object.entries(CAMP_DAILY).forEach(([period, data]) => {
            data.groups.forEach(g => {
              g.items.forEach(item => {
                const key = `${todayStr}_${period}_${item.id}`;
                aggregatedToday.push({
                  category:"Camp", color:ACCENT.amber, icon: item.critical ? "⚠" : "🏕",
                  text:item.text, done: !!campChecks[key],
                  onToggle: () => toggleCampCheck(key),
                });
              });
            });
          });
          // Camp weekly item for today's day of week
          const campWeeklyToday = CAMP_WEEKLY[todayDay];
          if (campWeeklyToday && campWeeklyToday.items.length > 0) {
            campWeeklyToday.items.forEach(item => {
              const key = `${todayStr}_weekly_${todayDay}_${item.id}`;
              aggregatedToday.push({
                category:"Camp", color:ACCENT.amber, icon: item.critical ? "⚠" : "🏕",
                text:item.text, done: !!campChecks[key],
                onToggle: () => toggleCampCheck(key),
              });
            });
          }

          // 4. Mocha — today's session template
          MOCHA_SESSION_TEMPLATE.forEach(s => {
            aggregatedToday.push({
              category:"Mocha", color:"#7a9c5b", icon:s.icon,
              text:s.label, done: !!(mochaSessionLog[todayStr]||{})[s.id],
              onToggle: () => toggleMochaSession(todayStr, s.id),
            });
          });

          // 5. Homeschool — handwriting + skill if chosen
          const todayHomeschool = homeschoolLog[todayStr] || {};
          aggregatedToday.push({
            category:"Homeschool", color:"#5a8fd0", icon:"📚",
            text:"Handwriting practice", done: !!todayHomeschool.handwriting,
            onToggle: () => saveHomeschool(todayStr, { handwriting: !todayHomeschool.handwriting }),
          });
          if (todayHomeschool.skill) {
            aggregatedToday.push({
              category:"Homeschool", color:"#5a8fd0", icon:"📚",
              text:`Skill: ${todayHomeschool.skill}`, done: !!todayHomeschool.skillDone,
              onToggle: () => saveHomeschool(todayStr, { skillDone: !todayHomeschool.skillDone }),
            });
          }

          // 6. Manually added extras (freeform, still supported for one-off tasks)
          const extraTodos = (todoLog[todayStr] || []).filter(t => !t.done);
          extraTodos.forEach(t => {
            const cat = TODO_CATEGORIES.find(c => c.key === t.category) || TODO_CATEGORIES[TODO_CATEGORIES.length-1];
            aggregatedToday.push({
              category:t.category, color:cat.color, icon:cat.icon,
              text:t.text, done:false,
              onToggle: () => toggleTodo(todayStr, t.id),
              onRemove: () => removeTodo(todayStr, t.id),
              isExtra: true,
            });
          });

          const aggByCategory = {};
          aggregatedToday.forEach(item => { (aggByCategory[item.category] = aggByCategory[item.category]||[]).push(item); });
          const aggCategoryOrder = ["Dive Training","Daily Musts","Camp","Mocha","Homeschool","Honeysuckle","Life Admin","Other"];
          const aggTotalDone = aggregatedToday.filter(i=>i.done).length;
          const aggTotal = aggregatedToday.length;

          // Week training stats
          const trainingSessions = DAYS.filter(d => {
            const s = currentWeek.sessions[d];
            return s && !["shabbat","rest","admin"].includes(s.type);
          });
          const completedSessions = trainingSessions.filter(d => {
            const dk = `${trainingPhase}_w${weekIdx}_${d}`;
            const s = currentWeek.sessions[d];
            return s?.tasks.some((_,i) => checked[`${dk}_${i}`]);
          });

          // Pool sessions this week
          const poolDays = trainingSessions.filter(d => currentWeek.sessions[d]?.type?.includes("pool"));
          const poolDone = poolDays.filter(d => {
            const dk = `${trainingPhase}_w${weekIdx}_${d}`;
            return currentWeek.sessions[d]?.tasks.some((_,i) => checked[`${dk}_${i}`]);
          });

          // Strength sessions
          const strengthDays = trainingSessions.filter(d => currentWeek.sessions[d]?.type?.includes("strength"));
          const strengthDone = strengthDays.filter(d => {
            const dk = `${trainingPhase}_w${weekIdx}_${d}`;
            return currentWeek.sessions[d]?.tasks.some((_,i) => checked[`${dk}_${i}`]);
          });

          // Dry static / breathwork
          const dryDays = trainingSessions.filter(d => currentWeek.sessions[d]?.type === "dry");
          const dryDone = dryDays.filter(d => {
            const dk = `${trainingPhase}_w${weekIdx}_${d}`;
            return currentWeek.sessions[d]?.tasks.some((_,i) => checked[`${dk}_${i}`]);
          });

          // Next moon
          const nextMoon = upcomingMoons[0];
          const daysToMoon = nextMoon ? Math.ceil((new Date(nextMoon.date) - new Date()) / (1000*60*60*24)) : null;

          // Today's meal
          const todayMeal = mealPlan[todayDay];

          // Latest static log entry
          const lastStatic = staticLog[0];

          // Progress ring helper
          function Ring({ pct, color, size=56, stroke=4, children }) {
            const r = (size - stroke*2) / 2;
            const circ = 2 * Math.PI * r;
            const dash = (pct/100) * circ;
            return (
              <div style={{ position:"relative", width:size, height:size, flexShrink:0 }}>
                <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
                  <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.border} strokeWidth={stroke} />
                  <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
                    strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
                    style={{ transition:"stroke-dasharray 0.6s ease" }} />
                </svg>
                <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                  {children}
                </div>
              </div>
            );
          }

              {(() => {
                const today = new Date();
                const isCampSeason = today >= new Date("2026-07-04");
                const track = getTrack(today, isCampSeason);
                const label = trackLabel(today);
                const isPool = [2,4,6].includes(today.getDay());
                const trackColor = isPool ? "#4aaa92" : "#5a8fd0";
                const [rhythmOpen, setRhythmOpen] = useState(false);
                return (
                  <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:10, marginBottom:16, overflow:"hidden" }}>
                    <div onClick={() => setRhythmOpen(o=>!o)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 14px", cursor:"pointer" }}>

                            const isAnchor = slot.category === "anchor";
                            return (
                              <div key={i} style={{ display:"flex", gap:12, marginBottom:10, alignItems:"flex-start" }}>

                                  width:32, flexShrink:0, textAlign:"right",

                                  border: slot.critical ? "2px solid #c4873a44" : "none",
                                  zIndex:1,
                                }} />
                                <div style={{ flex:1 }}>
                                  <div style={{ fontSize:13, color: slot.critical ? "#c4873a" : isAnchor ? T.textSub : cc }}>

                          <button onClick={() => setEditNote(null)} style={{ ...btnStyle(T.muted), color:T.textMid, background:T.muted }}>✕</button>
                        </div>
                      </div>
                    ) : (
                      <div style={{ marginTop:4 }}>
                        {note && <div style={{ fontSize:11, color:T.textMid, fontStyle:"italic", marginBottom:4, borderLeft:`2px solid ${ac}33`, paddingLeft:8 }}>{note}</div>}
                        <button onClick={() => { setEditNote(dk); setNoteText(note); }} style={{ background:"none", border:"none", color:T.textVeryDim, cursor:"pointer", fontSize:10, fontFamily:"inherit" }}>{note?"Edit note":"+ note"}</button>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── CYCLE & MOON VIEW ── */}
        {view === "cycle" && (
          <CycleAndMoon
            cyclePhase={cyclePhase} cycleDay={cycleDay}
            updateCycle={updateCycle}
            bleedDays={bleedDays} toggleBleedDay={toggleBleedDay}
            feelingsLog={feelingsLog} saveFeeling={saveFeeling}
            cycleStartDate={cycleStartDate} setCycleStartDate={(d)=>{ setCycleStartDate(d); persist({cycleStartDate:d}); }}
            upcomingMoons={upcomingMoons}
            cp={cp} ac={ac} T={T} CYCLE_PHASES={CYCLE_PHASES}
          />
        )}

        {/* ── LIFE ADMIN VIEW ── */}
        {view === "life" && (
          <div>
            <h2 style={{ fontSize:16, fontWeight:400, margin:"0 0 16px", color:ac }}>Life Admin</h2>

            {/* Homeschool */}
            {(() => {
              const todayStr = new Date().toISOString().slice(0,10);
              const today = homeschoolLog[todayStr] || {};
              return (
                <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:8, padding:14, marginBottom:16 }}>
                  <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.12em", color:T.textMid, marginBottom:10 }}>Homeschool · Today</div>
                  <div onClick={() => saveHomeschool(todayStr, { handwriting: !today.handwriting })} style={{
                    display:"flex", alignItems:"center", gap:9, cursor:"pointer", marginBottom:10,
                    background: today.handwriting ? ac+"15" : "transparent", borderRadius:6, padding:"6px 8px",
                  }}>
                    <div style={{ width:15, height:15, borderRadius:4, border:`1px solid ${today.handwriting?ac:T.border}`,
                      background:today.handwriting?ac:"transparent", display:"flex", alignItems:"center", justifyContent:"center" }}>
                      {today.handwriting && <span style={{ fontSize:9, color:"#fff" }}>✓</span>}
                    </div>
                    <span style={{ fontSize:13, color:today.handwriting?ac:T.textSub }}>Handwriting practice</span>
                  </div>

                  <div style={{ fontSize:10, color:T.textMid, marginBottom:6 }}>Today's skill (pick whatever fits their energy)</div>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:10 }}>
                    {HOMESCHOOL_SKILLS.map(s => (
                      <button key={s} onClick={() => saveHomeschool(todayStr, { skill: today.skill===s?"":s })} style={{
                        padding:"5px 11px", borderRadius:14, fontSize:11, cursor:"pointer",
                        border:`1px solid ${today.skill===s ? ac : T.border}`,
                        background: today.skill===s ? ac+"22" : "transparent",
                        color: today.skill===s ? ac : T.textFaint, fontFamily:"inherit",
                      }}>{s}</button>
                    ))}
                  </div>
                  {today.skill && (
                    <input value={today.skillNotes||""} onChange={e=>saveHomeschool(todayStr,{skillNotes:e.target.value})}
                      placeholder={`Notes on today's ${today.skill.toLowerCase()}...`}
                      style={{ ...inputStyle }} />
                  )}
                </div>
              );
            })()}

            {/* Weekly reflection */}
            <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:8, padding:14, marginBottom:16 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.12em", color:T.textMid }}>Weekly Reflection · Sunday</div>
                <button onClick={() => { setEditReflection(true); setReflectionText(weeklyReflection); }} style={{ background:"none", border:"none", color:T.textFaint, cursor:"pointer", fontSize:11, fontFamily:"inherit" }}>Edit</button>
              </div>
              {editReflection ? (
                <div>
                  <textarea value={reflectionText} onChange={e=>setReflectionText(e.target.value)}
                    placeholder={"What went well?\nWhat was hard?\nWhat needs to change?\nWhat am I grateful for?\nTop 3 priorities next week"}
                    style={{ ...inputStyle, minHeight:120, resize:"vertical", marginBottom:8 }} />
                  <div style={{ display:"flex", gap:8 }}>
                    <button onClick={saveReflection} style={btnStyle(ac)}>Save</button>
                    <button onClick={() => setEditReflection(false)} style={{ ...btnStyle(T.muted), color:T.textMid, background:T.muted }}>Cancel</button>
                  </div>
                </div>
              ) : (
                <div style={{ fontSize:12, color: weeklyReflection ? T.textSub : "#333", fontStyle:weeklyReflection?"normal":"italic", whiteSpace:"pre-wrap", lineHeight:1.6 }}>
                  {weeklyReflection || "No reflection yet. Add one on Sunday."}
                </div>
              )}
            </div>

            {/* Meal plan */}
            <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:8, padding:14, marginBottom:16 }}>
              <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.12em", color:T.textMid, marginBottom:12 }}>Meal Plan · Prep Sunday 🍲</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                {mealDays.map(d => {
                  const meal = mealPlan[d] || "";
                  const isEdit = editMeal===d;
                  return (
                    <div key={d} style={{ background:T.card, borderRadius:6, padding:"8px 10px", border:`1px solid ${T.border}` }}>
                      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                        <span style={{ fontSize:11, color:T.textMid }}>{d}</span>
                        <button onClick={() => { setEditMeal(d); setMealText(meal); }} style={{ background:"none", border:"none", color:T.textVeryDim, cursor:"pointer", fontSize:10, fontFamily:"inherit" }}>edit</button>
                      </div>
                      {isEdit ? (
                        <div>
                          <input value={mealText} onChange={e=>setMealText(e.target.value)} placeholder="Dinner plan..." style={{ ...inputStyle, marginBottom:6 }} />
                          <div style={{ display:"flex", gap:6 }}>
                            <button onClick={() => saveMeal(d)} style={{ ...btnStyle(TRAINING_C.grocery), fontSize:11, padding:"4px 10px" }}>Save</button>
                            <button onClick={() => setEditMeal(null)} style={{ background:"none", border:"none", color:T.textMid, cursor:"pointer", fontSize:11, fontFamily:"inherit" }}>✕</button>
                          </div>
                        </div>
                      ) : (
                        <div style={{ fontSize:12, color:meal?T.textSub:"#333", fontStyle:meal?"normal":"italic" }}>{meal||"—"}</div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Bills */}
            <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:8, padding:14, marginBottom:16 }}>
              <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.12em", color:T.textMid, marginBottom:10 }}>Bills & Due Dates</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 80px 30px", gap:8, marginBottom:10 }}>
                <input value={newBill.name} onChange={e=>setNewBill(p=>({...p,name:e.target.value}))} placeholder="Bill name" style={inputStyle} />
                <input value={newBill.amount} onChange={e=>setNewBill(p=>({...p,amount:e.target.value}))} placeholder="Amount" style={inputStyle} />
                <input value={newBill.dueDay} onChange={e=>setNewBill(p=>({...p,dueDay:e.target.value}))} placeholder="Day" style={inputStyle} />
                <button onClick={addBill} style={{ ...btnStyle(ac), padding:"7px 10px" }}>+</button>
              </div>
              {bills.length===0 ? (
                <div style={{ fontSize:12, color:T.textVeryDim, fontStyle:"italic" }}>No bills added yet.</div>
              ) : bills.map(b => (
                <div key={b.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 0", borderBottom:`1px solid ${T.border}` }}>
                  <div>
                    <span style={{ fontSize:13, color:T.textSub }}>{b.name}</span>
                    {b.amount && <span style={{ fontSize:11, color:T.textMid, marginLeft:10 }}>{b.amount}</span>}
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                    {b.dueDay && <span style={{ fontSize:11, color:ACCENT.amber }}>Due: {b.dueDay}</span>}
                    <button onClick={() => removeBill(b.id)} style={{ background:"none", border:"none", color:T.textFaint, cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>✕</button>
                  </div>
                </div>
              ))}
            </div>

            {/* Sunday anchor reminder */}
            <div style={{ background:T.card, border:`1px solid ${TRAINING_C.grocery}44`, borderRadius:8, padding:14 }}>
              <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.12em", color:TRAINING_C.grocery, marginBottom:8 }}>Sunday Anchor Rhythm 🌿</div>
              {["Grocery shop for the week","Batch meal prep","Intense pool session (see training plan)","Weekly reflection — write it out","Schedule next week — fill the calendar","Bill check — what's due this week?","Set intentions for the coming week"].map((t,i) => (
                <div key={i} style={{ fontSize:12, color:T.textMid, marginBottom:5, paddingLeft:10, borderLeft:`2px solid ${TRAINING_C.grocery}44` }}>{t}</div>
              ))}
            </div>
          </div>
        )}

        {/* ── TRAINING LOG VIEW ── */}
        {/* ── MANUAL VIEW ── */}
        {view === "manual" && (() => {
          const grouped = {};
          manualEntries.forEach(e => {
            const key = e.checklistItemText || "General";
            if (!grouped[key]) grouped[key] = [];
            grouped[key].push(e);
          });
          const items = Object.entries(grouped);
          return (
            <div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16 }}>
                <div>
                  <h2 style={{ fontSize:16, fontWeight:400, margin:"0 0 4px", color:ac }}>SOP Manual</h2>
                  <p style={{ margin:0, fontSize:12, color:T.textMid, fontStyle:"italic" }}>Building the Moorlands manual as you go — {manualEntries.length} entries logged</p>
                </div>
                {manualEntries.length > 0 && (
                  <button onClick={exportManual} style={{ padding:"7px 16px", background:ac, border:"none", borderRadius:5, color:"#fff", cursor:"pointer", fontSize:12, fontWeight:600, fontFamily:"inherit", whiteSpace:"nowrap" }}>Export ↓</button>
                )}
              </div>

              {items.length === 0 ? (
                <div style={{ textAlign:"center", padding:"40px 20px", color:T.textFaint, fontStyle:"italic" }}>
                  No entries yet. Go to the Camp tab and tap "+ log for manual" on any checklist item to start building your manual.
                </div>
              ) : (
                items.map(([item, entries]) => (
                  <div key={item} style={{ marginBottom:18, background:T.surface, border:`1px solid ${T.border}`, borderRadius:9, padding:14 }}>
                    <div style={{ fontSize:13, color:ac, marginBottom:10 }}>{item}</div>
                    {entries.sort((a,b) => b.date.localeCompare(a.date)).map(e => (
                      <div key={e.id} style={{ marginBottom:10, paddingBottom:10, borderBottom:`1px solid ${T.border}` }}>
                        <div style={{ display:"flex", justifyContent:"space-between" }}>
                          <span style={{ fontSize:11, color:T.textFaint }}>{e.date}</span>
                          <button onClick={() => removeManualEntry(e.id)} style={{ background:"none", border:"none", color:T.textFaint, cursor:"pointer", fontSize:12 }}>✕</button>
                        </div>
                        {e.whatDid && <div style={{ fontSize:12, color:T.textSub, marginTop:4 }}><span style={{ color:T.textDim }}>What:</span> {e.whatDid}</div>}
                        {e.why && <div style={{ fontSize:12, color:T.textSub, marginTop:2 }}><span style={{ color:T.textDim }}>Why:</span> {e.why}</div>}
                        {e.lessons && <div style={{ fontSize:12, color:T.textSub, marginTop:2, fontStyle:"italic" }}><span style={{ color:T.textDim }}>Lessons:</span> {e.lessons}</div>}
                      </div>
                    ))}
                  </div>
                ))
              )}
            </div>
          );
        })()}

        {view === "log" && (
          <div>
            <h2 style={{ fontSize:16, fontWeight:400, margin:"0 0 4px", color:ac }}>Training Log</h2>
            <p style={{ margin:"0 0 16px", fontSize:12, color:T.textMid, fontStyle:"italic" }}>Dry Static times + resting heart rate — David Lee's core data points.</p>

            {/* Entry form */}
            <div style={{ background:T.surface, border:`1px solid ${ac}33`, borderRadius:8, padding:14, marginBottom:20 }}>
              <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.12em", color:T.textMid, marginBottom:10 }}>Log a session</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
                <div><label style={labelStyle}>Date</label><input type="date" value={newStatic.date} onChange={e=>setNewStatic(p=>({...p,date:e.target.value}))} style={inputStyle} /></div>
                <div><label style={labelStyle}>Morning RHR (bpm)</label><input value={newStatic.rhr} onChange={e=>setNewStatic(p=>({...p,rhr:e.target.value}))} placeholder="e.g. 58" style={inputStyle} /></div>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:10 }}>
                {["h1","h2","h3"].map((k,i) => (
                  <div key={k}><label style={labelStyle}>Hold #{i+1} (m:ss)</label><input value={newStatic[k]} onChange={e=>setNewStatic(p=>({...p,[k]:e.target.value}))} placeholder="e.g. 1:45" style={inputStyle} /></div>
                ))}
              </div>
              <div style={{ marginBottom:10 }}><label style={labelStyle}>Notes (cycle phase, how it felt, contractions)</label><input value={newStatic.notes} onChange={e=>setNewStatic(p=>({...p,notes:e.target.value}))} placeholder="e.g. Follicular, felt strong, 6 contractions" style={inputStyle} /></div>
              <button onClick={() => {
                if (!newStatic.date) return;
                const next = [{ ...newStatic, phase:cyclePhase, id:Date.now() }, ...staticLog].slice(0,60);
                setStaticLog(next); persist({ staticLog:next });
                setNewStatic({ date:"", rhr:"", h1:"", h2:"", h3:"", notes:"" });
              }} style={btnStyle(ac)}>Save Entry</button>
            </div>

            {/* Log */}
            {staticLog.length===0 ? (
              <div style={{ fontSize:13, color:T.textVeryDim, textAlign:"center", padding:"30px 0", fontStyle:"italic" }}>No entries yet. First Pre Phase session: log your baseline Dry Static times.</div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {staticLog.map(e => {
                  const ph = CYCLE_PHASES[e.phase];
                  return (
                    <div key={e.id} style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:7, padding:"12px 14px" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                        <div style={{ display:"flex", gap:10, alignItems:"center" }}>
                          <span style={{ fontSize:13, color:T.text }}>{e.date}</span>
                          {ph && <span style={{ fontSize:10, padding:"1px 8px", borderRadius:10, background:ph.color+"22", color:ph.color }}>{ph.label}</span>}
                        </div>
                        {e.rhr && <span style={{ fontSize:11, color:ac }}>RHR: {e.rhr} bpm</span>}
                      </div>
                      <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginBottom:e.notes?8:0 }}>
                        {[e.h1,e.h2,e.h3].filter(Boolean).map((t,i) => (
                          <div key={i} style={{ background:T.card, borderRadius:5, padding:"5px 12px", textAlign:"center" }}>
                            <div style={{ fontSize:9, color:T.textFaint, marginBottom:2 }}>Hold #{i+1}</div>
                            <div style={{ fontSize:16, color:ac, fontVariantNumeric:"tabular-nums" }}>{t}</div>
                          </div>
                        ))}
                      </div>
                      {e.notes && <div style={{ fontSize:11, color:T.textDim, fontStyle:"italic" }}>{e.notes}</div>}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
